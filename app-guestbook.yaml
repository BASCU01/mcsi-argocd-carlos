apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/BASCU01/mcsi-argocd-carlos.git
    targetRevision: main
    path: guestbook

  destination:
    server: https://kubernetes.default.svc
    namespace: carlos

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
